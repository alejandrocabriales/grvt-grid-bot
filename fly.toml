# fly.toml — GRVT Grid Bot (standalone engine 24/7)
app = 'grvt-grid-bot'
primary_region = 'gru'

[build]

[env]
  GRVT_USE_TESTNET = "false"
  BOT_DB_PATH = "/data/bot-state.sqlite"

[[mounts]]
  source      = "bot_data"
  destination = "/data"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
