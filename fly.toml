# fly.toml — GRVT Grid Bot (Next.js UI + engine servidor 24/7)
app = 'grvt-grid-bot'
primary_region = 'gru'

[build]

[env]
  GRVT_USE_TESTNET = "false"
  BOT_DB_PATH = "/data/bot-state.sqlite"
  NODE_ENV = "production"

[[mounts]]
  source      = "bot_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https   = true
  auto_stop_machines  = false
  auto_start_machines = true

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
